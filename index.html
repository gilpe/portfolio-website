<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Professional portfolio of Javier Gil - Software Engineer specializing in web development">
    <meta name="keywords" content="software engineer, web developer, portfolio, frontend, backend">
    <meta name="author" content="Javier Gil">

    <title>Javier Gil | Game designer</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕹️</text></svg>">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Navigation -->
    <nav class="nav" id="nav">
        <div class="nav__container container">
            <a href="#home" class="nav__logo">JG</a>

            <div class="nav__menu" id="nav-menu">
                <ul class="nav__list">
                    <li class="nav__item">
                        <a href="#home" class="nav__link active" data-i18n="nav.home"></a>
                    </li>
                    <li class="nav__item">
                        <a href="#experience" class="nav__link" data-i18n="nav.experience"></a>
                    </li>
                    <li class="nav__item">
                        <a href="#education" class="nav__link" data-i18n="nav.education"></a>
                    </li>
                    <li class="nav__item">
                        <a href="#contact" class="nav__link" data-i18n="nav.contact"></a>
                    </li>
                </ul>

                <div class="nav__controls">
                    <!-- Language Switcher -->
                    <button class="nav__lang-btn" id="lang-toggle" aria-label="Switch language">
                        <span class="nav__lang-text"></span>
                    </button>

                    <!-- Theme Switcher -->
                    <button class="nav__theme-btn" id="theme-toggle" aria-label="Toggle theme">
                        <i class="fas fa-sun nav__theme-icon"></i>
                    </button>
                </div>
            </div>

            <!-- Mobile Menu Button -->
            <button class="nav__toggle" id="nav-toggle" aria-label="Toggle navigation menu">
                <i class="fas fa-bars nav__toggle-icon"></i>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <!-- Home Section -->
        <section class="hero section" id="home">
            <div class="hero__container container">
                <div class="hero__content">
                    <div class="hero__greeting">
                        <span class="hero__wave">👋</span>
                        <span class="hero__greeting-text" data-i18n="home.greeting"></span>
                    </div>

                    <h1 class="hero__name" data-i18n="home.name"></h1>

                    <h2 class="hero__title">
                        <span class="hero__title-text" data-i18n="home.title"></span>
                        <span class="hero__title-cursor">|</span>
                    </h2>

                    <p class="hero__summary" data-i18n="home.summary"></p>

                    <div class="hero__cta">
                        <a href="assets/documents/CV-Javier_Gil_Perez(2026).pdf" class="btn btn--primary" download>
                            <i class="fas fa-download btn__icon"></i>
                            <span data-i18n="home.downloadResume"></span>
                        </a>
                        <a href="#contact" class="btn btn--secondary">
                            <i class="fas fa-envelope btn__icon"></i>
                            <span data-i18n="home.contactMe"></span>
                        </a>
                    </div>

                    <div class="hero__social">
                        <a href="https://www.linkedin.com/in/jgilperez" target="_blank" rel="noopener noreferrer"
                            class="social-link" aria-label="LinkedIn">
                            <i class="fab fa-linkedin-in"></i>
                        </a>
                        <a href="https://github.com/gilpe/" target="_blank" rel="noopener noreferrer"
                            class="social-link" aria-label="GitHub">
                            <i class="fab fa-github"></i>
                        </a>
                        <a href="https://gilpe.itch.io/" target="_blank" rel="noopener noreferrer" class="social-link"
                            aria-label="itch">
                            <i class="fa-brands fa-itch-io"></i>
                        </a>
                        <a href="mailto:javier.gil.perez@outlook.es" class="social-link" aria-label="Email">
                            <i class="fas fa-envelope"></i>
                        </a>
                    </div>
                </div>

                <div class="hero__image">
                    <div class="hero__profile">
                        <div class="hero__profile-placeholder">
                            <img src="assets/images/profile.webp">
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Experience Section -->
        <section class="experience section" id="experience">
            <div class="container">
                <div class="section__header">
                    <h2 class="section__title" data-i18n="experience.title"></h2>
                    <p class="section__subtitle" data-i18n="experience.subtitle"></p>
                </div>

                <div class="timeline">
                    <!-- Experience Item 1 -->
                    <div class="timeline__item reveal">
                        <div class="timeline__marker"></div>
                        <div class="experience-card">
                            <div class="experience-card__header">
                                <div class="experience-card__company">
                                    <h3 class="experience-card__role" data-i18n="experience.items.0.role"></h3>
                                    <span class="experience-card__company-name"
                                        data-i18n="experience.items.0.company"></span>
                                </div>
                                <div class="experience-card__period">
                                    <span class="experience-card__date" data-i18n="experience.items.0.period"></span>
                                    <span class="experience-card__location"
                                        data-i18n="experience.items.0.location"></span>
                                </div>
                            </div>
                            <p class="experience-card__description" data-i18n="experience.items.0.description">
                            </p>
                            <div class="experience-card__responsibilities">
                                <h4 class="experience-card__subtitle" data-i18n="experience.responsibilities"></h4>
                                <ul class="experience-card__list">
                                    <li data-i18n="experience.items.0.responsibilities.0"></li>
                                    <li data-i18n="experience.items.0.responsibilities.1"></li>
                                    <li data-i18n="experience.items.0.responsibilities.2"></li>
                                    <li data-i18n="experience.items.0.responsibilities.3"></li>
                                </ul>
                            </div>

                            <div class="experience-card__tech">
                                <h4 class="experience-card__subtitle" data-i18n="experience.technologies"></h4>
                                <div class="experience-card__tags">
                                    <span class="tag">Unreal Engine</span>
                                    <span class="tag">FMOD</span>
                                    <span class="tag">Perforce</span>
                                    <span class="tag">Notion</span>
                                </div>
                            </div>

                            <!-- Multimedia placeholder -->
                            <div class="experience-card__media">
                                <div class="media-placeholder">
                                    <!-- Replace with: assets/images/experience-01.jpg -->
                                    <i class="fas fa-image"></i>
                                    <span data-i18n="experience.mediaPlaceholder"></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Experience Item 2 -->
                    <div class="timeline__item reveal">
                        <div class="timeline__marker"></div>
                        <div class="experience-card">
                            <div class="experience-card__header">
                                <div class="experience-card__company">
                                    <h3 class="experience-card__role" data-i18n="experience.items.1.role"></h3>
                                    <span class="experience-card__company-name"
                                        data-i18n="experience.items.1.company"></span>
                                </div>
                                <div class="experience-card__period">
                                    <span class="experience-card__date" data-i18n="experience.items.1.period"></span>
                                    <span class="experience-card__location"
                                        data-i18n="experience.items.1.location"></span>
                                </div>
                            </div>

                            <p class="experience-card__description" data-i18n="experience.items.1.description">
                            </p>

                            <div class="experience-card__responsibilities">
                                <h4 class="experience-card__subtitle" data-i18n="experience.responsibilities"></h4>
                                <ul class="experience-card__list">
                                    <li data-i18n="experience.items.1.responsibilities.0"></li>
                                    <li data-i18n="experience.items.1.responsibilities.1"></li>
                                    <li data-i18n="experience.items.1.responsibilities.2"></li>
                                    <li data-i18n="experience.items.1.responsibilities.3"></li>
                                </ul>
                            </div>

                            <div class="experience-card__tech">
                                <h4 class="experience-card__subtitle" data-i18n="experience.technologies"></h4>
                                <div class="experience-card__tags">
                                    <span class="tag">Unity</span>
                                    <span class="tag">Git LFS</span>
                                    <span class="tag">Github Projects</span>
                                </div>
                            </div>

                            <!-- Multimedia placeholder -->
                            <div class="experience-card__media">
                                <div class="media-placeholder">
                                    <!-- Replace with: assets/images/experience-02.jpg -->
                                    <i class="fas fa-image"></i>
                                    <span data-i18n="experience.mediaPlaceholder"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Education Section -->
        <section class="education section" id="education">
            <div class="container">
                <div class="section__header">
                    <h2 class="section__title" data-i18n="education.title"></h2>
                    <p class="section__subtitle" data-i18n="education.subtitle"></p>
                </div>

                <div class="education__grid">
                    <!-- Degree Card -->
                    <div class="education-card reveal">
                        <div class="education-card__icon">
                            <i class="fas fa-certificate"></i>
                        </div>
                        <div class="education-card__content">
                            <h3 class="education-card__title" data-i18n="education.degrees.0.title"></h3>
                            <span class="education-card__institution"
                                data-i18n="education.degrees.0.institution"></span>
                            <span class="education-card__period" data-i18n="education.degrees.0.period"></span>
                            <p class="education-card__description" data-i18n="education.degrees.0.description">
                            </p>
                        </div>
                    </div>

                    <!-- Certification Card -->
                    <div class="education-card reveal">
                        <div class="education-card__icon">
                            <i class="fas fa-graduation-cap"></i>
                        </div>
                        <div class="education-card__content">
                            <h3 class="education-card__title" data-i18n="education.certifications.0.title"></h3>
                            <span class="education-card__institution"
                                data-i18n="education.certifications.0.institution"></span>
                            <span class="education-card__period"
                                data-i18n="education.certifications.0.period">2022</span>
                            <p class="education-card__description" data-i18n="education.certifications.0.description">
                            </p>
                        </div>
                    </div>

                    <!-- Languages Card -->
                    <div class="education-card reveal">
                        <div class="education-card__icon">
                            <i class="fas fa-language"></i>
                        </div>
                        <div class="education-card__content">
                            <h3 class="education-card__title" data-i18n="education.languages.title"></h3>
                            <div class="education-card__languages">
                                <div class="language-item">
                                    <span class="language-item__name" data-i18n="education.languages.0.name"></span>
                                    <div class="language-item__level">
                                        <span class="language-item__dot filled"></span>
                                        <span class="language-item__dot filled"></span>
                                        <span class="language-item__dot filled"></span>
                                        <span class="language-item__dot filled"></span>
                                        <span class="language-item__dot filled"></span>
                                    </div>
                                    <span class="language-item__label" data-i18n="education.languages.0.level"></span>
                                </div>
                                <div class="language-item">
                                    <span class="language-item__name" data-i18n="education.languages.1.name"></span>
                                    <div class="language-item__level">
                                        <span class="language-item__dot filled"></span>
                                        <span class="language-item__dot filled"></span>
                                        <span class="language-item__dot filled"></span>
                                        <span class="language-item__dot"></span>
                                        <span class="language-item__dot"></span>
                                    </div>
                                    <span class="language-item__label" data-i18n="education.languages.1.level"></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Additional Training Card -->
                    <div class="education-card reveal">
                        <div class="education-card__icon">
                            <i class="fas fa-award"></i>
                        </div>
                        <div class="education-card__content">
                            <h3 class="education-card__title" data-i18n="education.training.title">
                            </h3>
                            <ul class="education-card__list">
                                <li data-i18n="education.training.items.0">
                                </li>
                                <li data-i18n="education.training.items.1">
                                </li>
                                <li data-i18n="education.training.items.2">
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Contact Section -->
        <section class="contact section" id="contact">
            <div class="container">
                <div class="section__header">
                    <h2 class="section__title" data-i18n="contact.title"></h2>
                    <p class="section__subtitle" data-i18n="contact.subtitle"></p>
                </div>

                <div class="contact__grid">
                    <div class="contact__info reveal">
                        <div class="contact__info-item">
                            <i class="fas fa-envelope contact__info-icon"></i>
                            <div>
                                <h3 class="contact__info-title" data-i18n="contact.email"></h3>
                                <a href="mailto:javier.gil.perez@outlook.es"
                                    class="contact__info-link">javier.gil.perez@outlook.es</a>
                            </div>
                        </div>

                        <div class="contact__info-item">
                            <i class="fas fa-brands fa-discord contact__info-icon"></i>
                            <div>
                                <h3 class="contact__info-title" data-i18n="contact.discord"></h3>
                                <a href="https://discord.com/users/726212200896921670/"
                                    class="contact__info-link">gilpe#8623</a>
                            </div>
                        </div>

                        <div class="contact__social">
                            <a href="https://www.linkedin.com/in/jgilperez" target="_blank" rel="noopener noreferrer"
                                class="social-link" aria-label="LinkedIn">
                                <i class="fab fa-linkedin-in"></i>
                            </a>
                            <a href="https://github.com/gilpe/" target="_blank" rel="noopener noreferrer"
                                class="social-link" aria-label="GitHub">
                                <i class="fab fa-github"></i>
                            </a>
                            <a href="https://gilpe.itch.io/" target="_blank" rel="noopener noreferrer"
                                class="social-link" aria-label="itch">
                                <i class="fa-brands fa-itch-io"></i>
                            </a>
                        </div>
                    </div>

                    <form class="contact__form reveal" id="contact-form" novalidate>
                        <div class="form-group">
                            <label for="name" class="form-label" data-i18n="contact.form.name"></label>
                            <input type="text" id="name" name="name" class="form-input" required
                                data-i18n-placeholder="contact.form.namePlaceholder" placeholder="">
                            <span class="form-error" id="name-error"></span>
                        </div>

                        <div class="form-group">
                            <label for="email" class="form-label" data-i18n="contact.form.email"></label>
                            <input type="email" id="email" name="email" class="form-input" required
                                data-i18n-placeholder="contact.form.emailPlaceholder" placeholder="">
                            <span class="form-error" id="email-error"></span>
                        </div>

                        <div class="form-group">
                            <label for="subject" class="form-label" data-i18n="contact.form.subject"></label>
                            <input type="text" id="subject" name="subject" class="form-input" required
                                data-i18n-placeholder="contact.form.subjectPlaceholder" placeholder="">
                            <span class="form-error" id="subject-error"></span>
                        </div>

                        <div class="form-group">
                            <label for="message" class="form-label" data-i18n="contact.form.message"></label>
                            <textarea id="message" name="message" class="form-input form-textarea" rows="5" required
                                data-i18n-placeholder="contact.form.messagePlaceholder" placeholder=""></textarea>
                            <span class="form-error" id="message-error"></span>
                        </div>

                        <button type="submit" class="btn btn--primary btn--full">
                            <i class="fas fa-paper-plane btn__icon"></i>
                            <span data-i18n="contact.form.submit"></span>
                        </button>

                        <!-- Success State -->
                        <div class="form-success" id="form-success">
                            <i class="fas fa-check-circle form-success__icon"></i>
                            <h3 class="form-success__title" data-i18n="contact.form.successTitle"></h3>
                            <p class="form-success__text" data-i18n="contact.form.successText"></p>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer__content">
                <p class="footer__text">
                    <span data-i18n="footer.copyright"></span>
                </p>
            </div>
        </div>
    </footer>

    <!-- Scroll to Top Button -->
    <button class="scroll-top" id="scroll-top" aria-label="Scroll to top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- JavaScript -->
    <script src="app.js"></script>
</body>

</html>
